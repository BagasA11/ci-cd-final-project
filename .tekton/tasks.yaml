apiVersion: tekton.dev/v1beta1
kind: Task
metadata: 
  name: cleanup-task

spec:
  workspaces:
    - name: source 

  steps:
  - name: init
    image: ubuntu:latest
    script: |
      rm -rf $PWD/*
--- 

apiVersion: tekton.dev/v1beta1
kind: Task
metadata: 
  name: npm-install
spec: 
  workspaces:
    - name: source 
  steps:
  - name: install-dependencies 
    image: localstack/lambda-cve-mitigated-nodejs:20
    script: |
      npm install 
--- 

apiVersion: tekton.dev/v1beta1
kind: Task
metadata: 
  name: eslint 
spec: 
  steps: 
  - name: run-eslint
    image: localstack/lambda-cve-mitigated-nodejs:20
    script: |
      npm run lint
--- 

apiVersion: tekton.dev/v1beta1
kind: Task
metadata: 
  name: jest 
spec:
  workspaces:
  - name: source
  steps: 
  - name: run-test-with-jest
    image: localstack/lambda-cve-mitigated-nodejs:20
    script: |
      npm run test
  